<!DOCTYPE html>
<html lang="pt" class="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sales Fill Rate — Fersa Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --origin:#003256;
      --electric:#00A9FF;
      --power:#96CF17;
      --soul:#50DCC8;
      --warn:#E8A020;
      --danger:#D32F2F;
      --bg:#ECEEF1;
      --surface:#FFFFFF;
      --border:rgba(133,149,156,.22);
      --text:#465055;
      --muted:#85959C;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter','Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}

    .topbar{display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:64px;background:#003256;position:sticky;top:0;z-index:100}
    .topbar-left{display:flex;align-items:center;gap:20px}
    .topbar-logo img{height:20px;display:block}
    .topbar-logo a{display:block;line-height:0}
    .topbar-sep{width:1px;height:20px;background:rgba(255,255,255,.15)}
    .topbar-product{font-size:12px;font-weight:400;color:rgba(255,255,255,.4);letter-spacing:.08em;text-transform:uppercase}
    .topbar-nav{display:flex;gap:4px;margin:0 auto}
    .nav-btn{display:flex;align-items:center;padding:6px 14px;border-radius:6px;font-size:13px;font-weight:500;color:rgba(255,255,255,.6);text-decoration:none;border:1px solid transparent;transition:background .15s,color .15s;white-space:nowrap}
    .nav-btn:hover{background:rgba(255,255,255,.08);color:#fff}
    .nav-btn.active{background:rgba(0,169,255,.15);color:#00A9FF;border-color:rgba(0,169,255,.25)}
    .topbar-right{display:flex;align-items:center;gap:7px;color:rgba(255,255,255,.45);font-size:12px}

    .page-header{background:linear-gradient(90deg,#001e3c 0%,#002f56 55%,#004580 100%);padding:20px 40px;border-bottom:3px solid var(--electric)}
    .page-header-eyebrow{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:4px}
    .page-header-title{font-size:22px;font-weight:700;color:#fff;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .badge{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#003256;background:#fff;padding:4px 8px;border-radius:999px}

    .filters-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 32px;display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end}
    .filter-group{display:flex;flex-direction:column;gap:4px}
    .filter-label{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted)}
    .filter-select,.filter-input{height:34px;border:1px solid var(--border);border-radius:6px;padding:0 10px;font-size:13px;font-family:'Inter',sans-serif;color:var(--text);background:var(--bg);outline:none;transition:border-color .15s;min-width:120px}
    .filter-select:focus,.filter-input:focus{border-color:var(--electric)}
    .filter-input{width:200px}

    .toggle-wrap{margin-left:auto;display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap;justify-content:flex-end}
    .toggle-group{display:flex;flex-direction:column;gap:4px}
    .toggle{position:relative;display:inline-flex;background:#e2e5e9;border-radius:8px;padding:3px}
    .toggle-btn{padding:5px 14px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:background .15s,color .15s;white-space:nowrap}
    .toggle-btn.on{background:#fff;color:var(--origin);box-shadow:0 1px 4px rgba(0,0,0,.12)}
    .btn-reset,.btn-export{height:34px;padding:0 14px;border-radius:6px;border:none;font-size:12px;font-weight:500;cursor:pointer;transition:background .15s;color:#fff}
    .btn-reset{background:var(--origin)}
    .btn-reset:hover{background:#004a7a}
    .btn-export{background:var(--electric)}
    .btn-export:hover{background:#008fd6}

    .section-label{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:24px 32px 10px}

    .kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px;padding:0 32px 4px}
    .kpi{background:var(--surface);border-radius:10px;border:1px solid var(--border);padding:18px 20px;position:relative;overflow:hidden}
    .kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--kc,var(--electric))}
    .kpi-lbl{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
    .kpi-val{font-size:26px;font-weight:700;color:var(--kc,var(--origin));line-height:1.1}
    .kpi-sub{font-size:11px;color:var(--muted);margin-top:3px}
    .kpi-icon{position:absolute;bottom:10px;right:14px;font-size:20px;opacity:.12}
    .kpi-blue{--kc:var(--electric)}
    .kpi-green{--kc:#2e7d32}
    .kpi-teal{--kc:var(--soul)}
    .kpi-warn{--kc:var(--warn)}
    .kpi-red{--kc:var(--danger)}
    .kpi-lime{--kc:var(--power)}

    .charts-row{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin:0 32px 0}
    .chart-card{background:var(--surface);border-radius:10px;border:1px solid var(--border);padding:18px 20px}
    .chart-title{font-size:12px;font-weight:600;color:var(--origin);margin-bottom:14px;letter-spacing:.02em}
    .chart-wrap{position:relative;height:260px}
    @media(max-width:900px){.charts-row{grid-template-columns:1fr} .toggle-wrap{margin-left:0}}

    .table-section{margin:0 32px 32px;background:var(--surface);border-radius:10px;border:1px solid var(--border);overflow:hidden}
    .table-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:13px 18px;border-bottom:1px solid var(--border);background:#f9fafb;flex-wrap:wrap}
    .table-title{font-size:13px;font-weight:600;color:var(--origin)}
    .table-sub{font-size:11px;color:var(--muted)}
    .tbl-wrap{overflow-x:auto;max-height:480px;overflow-y:auto}
    .tbl-wrap::-webkit-scrollbar{width:4px;height:4px}
    .tbl-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
    table{width:100%;border-collapse:collapse;font-size:12px}
    thead{position:sticky;top:0;z-index:2}
    thead th{background:#f3f5f7;color:var(--muted);font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;padding:9px 14px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
    thead th:hover{color:var(--origin)}
    thead th.sorted{color:var(--electric)}
    tbody tr:hover{background:rgba(0,169,255,.04)}
    tbody td{padding:8px 14px;border-bottom:1px solid rgba(133,149,156,.09);vertical-align:middle}
    tbody tr:last-child td{border-bottom:none}
    .td-num{text-align:right;font-variant-numeric:tabular-nums}
    .td-brand{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px}
    .b-FER{background:#e3edf5;color:#003256}
    .b-AS {background:#edf7e3;color:#2e7d32}
    .b-NKE{background:#e0f4ff;color:#0077b6}
    .b-PFI{background:#fff3e0;color:#bf6c00}
    .fr-bar{display:flex;align-items:center;gap:6px}
    .fr-track{flex:1;height:6px;background:#e8eaed;border-radius:3px;min-width:60px}
    .fr-fill{height:100%;border-radius:3px;transition:width .3s}
    .fr-text{font-size:11px;font-weight:600;min-width:40px;text-align:right}
    .no-data{text-align:center;padding:40px;color:var(--muted);font-size:13px}

    .pagination{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;border-top:1px solid var(--border);font-size:12px;color:var(--muted);background:var(--surface);gap:10px;flex-wrap:wrap}
    .page-btns{display:flex;gap:4px;flex-wrap:wrap}
    .page-btn{padding:4px 10px;border-radius:5px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:12px;color:var(--text);transition:background .12s}
    .page-btn:hover{background:var(--bg)}
    .page-btn.active-page{background:var(--origin);color:#fff;border-color:var(--origin)}
    .page-btn:disabled{opacity:.4;cursor:not-allowed}

    .footer{background:#f3f5f7;border-top:1px solid var(--border);padding:14px 32px;display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:8px;gap:10px;flex-wrap:wrap}
    .loading{text-align:center;padding:40px;color:var(--muted);font-size:15px;}
  </style>
</head>

<script>
// ==================== CONFIG ====================
const CSV_URL = 'sales_fill_rate.csv';   // Nome do arquivo no mesmo diretório

let D = { rows: [], brands: [], years: [] };
let modeValue = 'qty';
let modeRate = 'overall';
let sortCol = 7;
let sortDir = -1;
let currentPage = 1;
const PAGE_SIZE = 100;
let filtered = [];
let chTrend = null;
let chBrand = null;

const MONTH_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// ==================== UTILS ====================
function fmt(n) { return Number(n || 0).toLocaleString('en-US'); }
function fmtAmt(n) { return '€ ' + Number(n || 0).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}); }
function fmtPct(n) { return Number(n || 0).toFixed(1) + '%'; }

function brandClass(b) {
  if (b === 'A&S') return 'b-AS';
  if (b === 'NKE') return 'b-NKE';
  if (b === 'PFI') return 'b-PFI';
  return 'b-FER';
}

function frColor(pct) {
  if (pct >= 95) return '#2e7d32';
  if (pct >= 80) return '#96CF17';
  if (pct >= 60) return '#E8A020';
  return '#D32F2F';
}

// ==================== CSV PARSER ====================
async function loadCSV() {
  const loadingDiv = document.createElement('div');
  loadingDiv.className = 'loading';
  loadingDiv.innerHTML = 'Carregando dados do CSV...';
  document.body.appendChild(loadingDiv);

  try {
    const response = await fetch(CSV_URL);
    if (!response.ok) throw new Error('CSV não encontrado');
    
    const text = await response.text();
    const rows = text.split('\n').map(row => row.split(';').map(cell => cell.trim().replace(/"/g,'')));

    const headers = rows[0];
    const dataRows = rows.slice(1).filter(r => r.length > 5 && r[0]);

    const processed = [];
    const brandsSet = new Set();
    const yearsSet = new Set();

    dataRows.forEach(row => {
      const intakeDate = row[4];
      if (!intakeDate) return;

      const [day, month, year] = intakeDate.split('/');
      const y = parseInt(year);
      const m = parseInt(month);

      if (!y || !m) return;

      const intakeQty = parseFloat(row[5].replace(',', '.')) || 0;
      const intakeAmt = parseFloat(row[6].replace(',', '.')) || 0;
      const pendingQty = parseFloat(row[7].replace(',', '.')) || 0;
      const pendingAmt = parseFloat(row[8].replace(',', '.')) || 0;

      const onTimeQty = intakeQty - pendingQty;
      const onTimeAmt = intakeAmt - pendingAmt;

      processed.push([
        row[0],           // Item ID
        row[1],           // Catalog
        row[2],           // Brand
        y,                // Year
        m,                // Month
        intakeQty,
        intakeAmt,
        pendingQty,
        pendingAmt,
        onTimeQty,        // On-time Qty
        onTimeAmt         // On-time Amt
      ]);

      brandsSet.add(row[2]);
      yearsSet.add(y);
    });

    D.rows = processed;
    D.brands = Array.from(brandsSet).sort();
    D.years = Array.from(yearsSet).sort();

    document.body.removeChild(loadingDiv);
    initDashboard();

  } catch (err) {
    console.error(err);
    loadingDiv.innerHTML = `Erro ao carregar CSV:<br><small>${err.message}</small>`;
  }
}

// ==================== DASHBOARD LOGIC (mantido igual) ====================
function initFilters() {
  const bSel = document.getElementById('fBrand');
  D.brands.forEach(b => {
    const o = document.createElement('option');
    o.value = b; o.textContent = b;
    bSel.appendChild(o);
  });

  const ySel = document.getElementById('fYear');
  D.years.forEach(y => {
    const o = document.createElement('option');
    o.value = y; o.textContent = y;
    ySel.appendChild(o);
  });

  // Months
  const mSel = document.getElementById('fMonth');
  for (let i = 1; i <= 12; i++) {
    const o = document.createElement('option');
    o.value = i;
    o.textContent = MONTH_SHORT[i-1];
    mSel.appendChild(o);
  }
}

function getActiveFilters() {
  return {
    brand: document.getElementById('fBrand').value,
    year: document.getElementById('fYear').value,
    month: document.getElementById('fMonth').value,
    itemId: document.getElementById('fItemID').value.trim().toLowerCase(),
    catalog: document.getElementById('fCatalog').value.trim().toLowerCase()
  };
}

function rowMatchesFilters(r, f) {
  if (f.brand && r[2] !== f.brand) return false;
  if (f.year && String(r[3]) !== String(f.year)) return false;
  if (f.month && String(r[4]) !== String(f.month)) return false;
  if (f.itemId && !String(r[0]).toLowerCase().includes(f.itemId)) return false;
  if (f.catalog && !String(r[1]).toLowerCase().includes(f.catalog)) return false;
  return true;
}

function getIntake(r) { return modeValue === 'qty' ? r[5] : r[6]; }
function getOverallFilled(r) { return modeValue === 'qty' ? (r[5] - r[7]) : (r[6] - r[8]); }
function getOnTimeFilled(r) { return modeValue === 'qty' ? r[9] : r[10]; }
function getFilled(r) { return modeRate === 'overall' ? getOverallFilled(r) : getOnTimeFilled(r); }
function getRemaining(r) { return Math.max(0, getIntake(r) - getFilled(r)); }
function getFillRate(r) {
  const intake = getIntake(r);
  return intake > 0 ? (getFilled(r) / intake) : 0;
}
function getPeriod(r) {
  return String(r[3]) + '-' + String(r[4]).padStart(2, '0');
}

function applyFilters() {
  const f = getActiveFilters();
  filtered = D.rows.filter(r => rowMatchesFilters(r, f));
  sortTable(sortCol, true);
}

function sortTable(col, keepDir = false) {
  if (!keepDir) {
    if (sortCol === col) sortDir *= -1;
    else { sortCol = col; sortDir = -1; }
  }

  document.querySelectorAll('thead .si').forEach(s => s.textContent = '↕');
  const ths = document.querySelectorAll('thead th');
  if (ths[col]) {
    const si = ths[col].querySelector('.si');
    if (si) si.textContent = sortDir === 1 ? '↑' : '↓';
    ths.forEach((t, i) => t.classList.toggle('sorted', i === col));
  }

  filtered.sort((a, b) => {
    let va, vb;
    if (col === 0) { va = a[0]; vb = b[0]; }
    else if (col === 1) { va = String(a[1]); vb = String(b[1]); }
    else if (col === 2) { va = a[2]; vb = b[2]; }
    else if (col === 3) { va = getPeriod(a); vb = getPeriod(b); }
    else if (col === 4) { va = getIntake(a); vb = getIntake(b); }
    else if (col === 5) { va = getFilled(a); vb = getFilled(b); }
    else if (col === 6) { va = getRemaining(a); vb = getRemaining(b); }
    else { va = getFillRate(a); vb = getFillRate(b); }

    if (typeof va === 'string') return va.localeCompare(vb) * sortDir;
    return (va - vb) * sortDir;
  });

  currentPage = 1;
  render();
}

function renderKPIs() {
  let totIntake = 0, totFilled = 0, totOverallFilled = 0, totItems = new Set();
  for (const r of filtered) {
    totIntake += getIntake(r);
    totFilled += getFilled(r);
    totOverallFilled += getOverallFilled(r);
    totItems.add(r[0]);
  }
  const totRest = Math.max(0, totIntake - totFilled);
  const rate = totIntake > 0 ? (totFilled / totIntake * 100) : 0;
  const overallRate = totIntake > 0 ? (totOverallFilled / totIntake * 100) : 0;

  // KPIs (você pode expandir conforme necessário)
  document.getElementById('k-intake').textContent = modeValue === 'qty' ? fmt(totIntake) : fmtAmt(totIntake);
  // ... (resto dos KPIs conforme seu HTML original)
}

function render() {
  renderKPIs();
  renderTable();
  renderCharts();
}

// ==================== INIT ====================
function initDashboard() {
  initFilters();
  applyFilters();

  // Event listeners (mantidos do seu código original)
  document.getElementById('tQty').addEventListener('click', () => { modeValue = 'qty'; document.getElementById('tQty').classList.add('on'); document.getElementById('tAmt').classList.remove('on'); applyFilters(); });
  document.getElementById('tAmt').addEventListener('click', () => { modeValue = 'amt'; document.getElementById('tAmt').classList.add('on'); document.getElementById('tQty').classList.remove('on'); applyFilters(); });
  document.getElementById('tOverall').addEventListener('click', () => { modeRate = 'overall'; document.getElementById('tOverall').classList.add('on'); document.getElementById('tOnTime').classList.remove('on'); applyFilters(); });
  document.getElementById('tOnTime').addEventListener('click', () => { modeRate = 'ontime'; document.getElementById('tOnTime').classList.add('on'); document.getElementById('tOverall').classList.remove('on'); applyFilters(); });

  document.getElementById('btnReset').addEventListener('click', () => {
    document.getElementById('fBrand').value = '';
    document.getElementById('fYear').value = '';
    document.getElementById('fMonth').value = '';
    document.getElementById('fItemID').value = '';
    document.getElementById('fCatalog').value = '';
    applyFilters();
  });

  document.getElementById('btnExport').addEventListener('click', exportFilteredToExcel);

  ['fBrand','fYear','fMonth'].forEach(id => document.getElementById(id).addEventListener('change', applyFilters));
  ['fItemID','fCatalog'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
      clearTimeout(window.__t);
      window.__t = setTimeout(applyFilters, 300);
    });
  });

  document.querySelectorAll('thead th').forEach(th => {
    th.addEventListener('click', () => sortTable(Number(th.dataset.col)));
  });
}
