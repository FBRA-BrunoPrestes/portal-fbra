<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Summary — Fersa Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-font-smoothing: antialiased; }
    body {
      font-family: 'DM Sans', 'Segoe UI', sans-serif;
      background: #003256;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* TOPBAR */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      height: 64px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      background: rgba(0,50,86,0.95);
      position: sticky;
      top: 0;
      z-index: 100;
      flex-shrink: 0;
    }
    .topbar-left { display: flex; align-items: center; gap: 20px; }
    .topbar-logo img { height: 20px; display: block; }
    .topbar-sep { width: 1px; height: 20px; background: rgba(255,255,255,0.15); }
    .topbar-product { font-size: 12px; font-weight: 400; color: rgba(255,255,255,0.4); letter-spacing: 0.08em; text-transform: uppercase; }
    .topbar-right { display: flex; align-items: center; gap: 7px; }
    .topbar-flag img { display: block; width: 36px; height: 25px; border-radius: 3px; opacity: 0.85; }
    .topbar-flag span { font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.5); letter-spacing: 0.06em; }

    /* NAV */
    .topbar-nav {
      display: flex;
      gap: 4px;
      margin: 0 auto;
    }
    .nav-btn {
      display: flex;
      align-items: center;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      border: 1px solid transparent;
      transition: background .15s, color .15s;
      white-space: nowrap;
    }
    .nav-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .nav-btn.active {
      background: rgba(0,169,255,0.15);
      color: #00A9FF;
      border-color: rgba(0,169,255,0.25);
    }

    /* CONTENT */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 24px 48px;
    }
    .page-title {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-bottom: 20px;
      align-self: flex-start;
      max-width: 1784px;
      width: 100%;
    }
    .dashboard-img {
      width: 100%;
      max-width: 1784px;
      height: auto;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.08);
      display: block;
    }
  </style>
</head>
<body>
<script>

(function(){
  var SESSION_KEY  = 'fersa_portal_auth';
  var REDIRECT_KEY = 'fersa_portal_redirect';
  if (!sessionStorage.getItem(SESSION_KEY)) {
    sessionStorage.setItem(REDIRECT_KEY, window.location.href);
    window.location.replace('login.html');
  }
})();
</script>
