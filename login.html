<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fersa Portal — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --origin:       #003256;
      --electric:     #00A9FF;
      --white:        #FFFFFF;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-font-smoothing: antialiased; }
    body {
      font-family: 'DM Sans', 'Segoe UI', sans-serif;
      background: var(--origin);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }
    .bg-pattern { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .bg-pattern::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(0,169,255,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 90% 80%, rgba(0,169,255,0.07) 0%, transparent 60%);
    }
    .bg-pattern::after {
      content: '';
      position: absolute; inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1px);
      background-size: 28px 28px;
    }
    .topbar {
      position: relative; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; height: 64px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      backdrop-filter: blur(12px);
      background: rgba(0,50,86,0.6);
    }
    .topbar-left { display: flex; align-items: center; gap: 20px; }
    .topbar-logo img { height: 20px; filter: brightness(0) invert(1); display: block; }
    .topbar-sep { width: 1px; height: 20px; background: rgba(255,255,255,0.15); }
    .topbar-product { font-size: 12px; font-weight: 400; color: rgba(255,255,255,0.4); letter-spacing: 0.08em; text-transform: uppercase; }
    .main { position: relative; z-index: 5; flex: 1; display: flex; align-items: center; justify-content: center; padding: 48px 24px; }
    .login-card {
      width: 100%; max-width: 420px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 16px; padding: 40px 36px;
      backdrop-filter: blur(16px);
      animation: fadeUp 0.5s ease both;
    }
    .login-logo { text-align: center; margin-bottom: 28px; }
    .login-logo img { height: 32px; filter: brightness(0) invert(1); }
    .login-title { font-size: 22px; font-weight: 600; color: var(--white); text-align: center; margin-bottom: 6px; letter-spacing: -0.01em; }
    .login-subtitle { font-size: 13px; font-weight: 400; color: rgba(255,255,255,0.45); text-align: center; margin-bottom: 32px; }
    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.6); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; }
    .form-input {
      width: 100%; height: 46px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px; padding: 0 16px;
      font-family: inherit; font-size: 15px; font-weight: 400;
      color: var(--white); outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .form-input::placeholder { color: rgba(255,255,255,0.25); }
    .form-input:focus { border-color: rgba(0,169,255,0.5); background: rgba(0,169,255,0.06); }
    .form-input.error { border-color: rgba(211,47,47,0.7); background: rgba(211,47,47,0.05); }
    .error-msg {
      display: none; align-items: center; gap: 8px;
      background: rgba(211,47,47,0.12); border: 1px solid rgba(211,47,47,0.3);
      border-radius: 8px; padding: 10px 14px;
      font-size: 13px; color: #ff6b6b; margin-bottom: 20px;
    }
    .error-msg.visible { display: flex; }
    .error-msg svg { flex-shrink: 0; width: 16px; height: 16px; }
    .btn-login {
      width: 100%; height: 48px;
      background: var(--electric); border: none; border-radius: 10px;
      font-family: inherit; font-size: 15px; font-weight: 600;
      color: var(--origin); cursor: pointer; letter-spacing: 0.02em;
      transition: opacity 0.2s, transform 0.15s; margin-top: 8px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-login:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .btn-login .spinner {
      display: none; width: 18px; height: 18px;
      border: 2px solid rgba(0,50,86,0.3); border-top-color: var(--origin);
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    .btn-login.loading .spinner { display: block; }
    .btn-login.loading .btn-text { display: none; }
    .divider { border: none; border-top: 1px solid rgba(255,255,255,0.07); margin: 28px 0 20px; }
    .login-footer-note { font-size: 12px; color: rgba(255,255,255,0.25); text-align: center; line-height: 1.5; }
    .footer-line {
      position: relative; z-index: 5;
      border-top: 1px solid rgba(255,255,255,0.06);
      padding: 18px 40px; display: flex; align-items: center; justify-content: space-between;
      font-size: 12px; color: rgba(255,255,255,0.2);
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 480px) {
      .topbar { padding: 0 20px; }
      .login-card { padding: 32px 24px; }
      .footer-line { padding: 16px 20px; flex-direction: column; gap: 6px; text-align: center; }
    }
  </style>
</head>

    async function sha256(message) {
      const msgBuffer  = new TextEncoder().encode(message);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray  = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

      usernameEl.classList.add('error');
      passwordEl.classList.add('error');
    }
    function clearError() {
      errorMsg.classList.remove('visible');
      usernameEl.classList.remove('error');
      passwordEl.classList.remove('error');
    }

    async function doLogin() {
      clearError();
      const user = usernameEl.value.trim();
      const pass = passwordEl.value;
      if (!user || !pass) { showError('Please enter username and password'); return; }
      btnLogin.classList.add('loading');
      btnLogin.disabled = true;
      try {
        const passHash = await sha256(pass);
        if (user === VALID_USER && passHash === VALID_HASH) {
          sessionStorage.setItem(SESSION_KEY, '1');
          const redirect = sessionStorage.getItem(REDIRECT_KEY) || 'index.html';
          sessionStorage.removeItem(REDIRECT_KEY);
          window.location.replace(redirect);
        } else {
          showError('Invalid username or password');
          passwordEl.value = '';
          passwordEl.focus();
        }
      } catch(e) {
        showError('Internal error, please try again');
      } finally {
        btnLogin.classList.remove('loading');
        btnLogin.disabled = false;
      }
    }

    btnLogin.addEventListener('click', doLogin);
    [usernameEl, passwordEl].forEach(el => {
      el.addEventListener('input', clearError);
      el.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    });
    usernameEl.focus();
  </script>
</body>
</html>
